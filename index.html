<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Gallery</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="container">
        <a href="#" class="section">
            <div class="shader-layer" id="canvas-1"></div>
            <div class="content">
                <span class="label">Diseño Web</span>
                <h1>CHARLOTTE WEB</h1>
                <div class="btn">EXPLORAR</div>
            </div>
        </a>

        <a href="#" class="section">
            <div class="shader-layer" id="canvas-2"></div>
            <div class="content">
                <span class="label">Proyecto Social</span>
                <h1>PROTECTORA</h1>
                <div class="btn">ENTRAR</div>
            </div>
        </a>

        <a href="#" class="section">
            <div class="shader-layer" id="canvas-3"></div>
            <div class="content">
                <span class="label">Simulador</span>
                <h1>FOOTBALL MANAGER</h1>
                <div class="btn">PRÓXIMAMENTE</div>
            </div>
        </a>
    </div>
    <script src="script.js"></script>
</body>
</html>
